extensions:
  - addsTo:
      pack: codeql/java-all
      extensible: sinkModel
    data:
      # --- Uri methods that accept tainted input for URI construction (SSRF) ---
      # Uri.extend(Uri) - combines base URI with tainted extension
      - ["org.http4k.core", "Uri", false, "extend", "", "", "request-forgery", "Argument[0]", "manual"]
      # Uri.relative(String) - RFC3986 relative resolution with tainted input
      - ["org.http4k.core", "Uri", false, "relative", "(String)", "", "request-forgery", "Argument[0]", "manual"]
      # Uri.appendToPath(String) - appends tainted path segment
      - ["org.http4k.core", "Uri", false, "appendToPath", "(String)", "", "request-forgery", "Argument[0]", "manual"]

      # --- Request factory with tainted URI (SSRF) ---
      # Request(Method, String/Uri) - the string/Uri is parsed as URI
      - ["org.http4k.core", "Request$Companion", false, "invoke", "", "", "request-forgery", "Argument[1]", "manual"]

      # --- Request.uri(Uri) - modifying an existing request's URI ---
      - ["org.http4k.core", "Request", true, "uri", "(Uri)", "", "request-forgery", "Argument[0]", "manual"]
