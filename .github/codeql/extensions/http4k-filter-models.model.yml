extensions:
  - addsTo:
      pack: codeql/java-all
      extensible: summaryModel
    data:
      # resolvedWithinRoot() - path sanitization (resourcePath.kt → ResourcePathKt)
      # Returns null for traversal attempts (.., backslashes, null bytes), cleaned path otherwise
      - ["org.http4k.routing", "ResourcePathKt", false, "resolvedWithinRoot", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # ServerFilters.CatchAll.originalBehaviour - leaks stack trace into response body
      # Stack trace flows from exception to Response body (info disclosure)
      # JVM: ServerFilters$CatchAll (nested object)
      - ["org.http4k.filter", "ServerFilters$CatchAll", false, "originalBehaviour", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
