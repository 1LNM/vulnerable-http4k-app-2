extensions:
  - addsTo:
      pack: codeql/java-all
      extensible: sourceModel
    data:
      # --- org.http4k.core.Request (interface, subtypes=true) ---
      - ["org.http4k.core", "Request", true, "query", "(String)", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "Request", true, "queries", "(String)", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "Request", true, "header", "(String)", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "Request", true, "headerValues", "(String)", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "Request", true, "getBody", "()", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "Request", true, "bodyString", "()", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "Request", true, "getUri", "()", "", "remote", "ReturnValue", "manual"]

      # --- Extension functions: form data (FormBody.kt -> FormBodyKt) ---
      - ["org.http4k.core.body", "FormBodyKt", false, "form", "", "", "remote", "ReturnValue", "manual"]

      # --- Extension functions: cookies (CookieExtensions.kt -> CookieExtensionsKt) ---
      - ["org.http4k.core.cookie", "CookieExtensionsKt", false, "cookies", "", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core.cookie", "CookieExtensionsKt", false, "cookie", "", "", "remote", "ReturnValue", "manual"]

      # --- Extension function: path parameter (extensions.kt -> ExtensionsKt) ---
      - ["org.http4k.routing", "ExtensionsKt", false, "path", "", "", "remote", "ReturnValue", "manual"]

      # --- HttpMessage interface (covers both Request and Response, subtypes=true) ---
      - ["org.http4k.core", "HttpMessage", true, "header", "(String)", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "headerValues", "(String)", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "bodyString", "()", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "getBody", "()", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "getHeaders", "()", "", "remote", "ReturnValue", "manual"]

      # --- Extension functions: form data extras (FormBody.kt -> FormBodyKt) ---
      - ["org.http4k.core.body", "FormBodyKt", false, "formAsMap", "", "", "remote", "ReturnValue", "manual"]

      # --- Uri.credentials() - extracts username/password from URI userInfo ---
      - ["org.http4k.core", "Uri", false, "credentials", "", "", "remote", "ReturnValue", "manual"]

      # --- Extension functions: auth extraction (header.kt -> HeaderKt) ---
      - ["org.http4k.lens", "HeaderKt", false, "bearerToken", "", "", "remote", "ReturnValue", "manual"]
      - ["org.http4k.lens", "HeaderKt", false, "basicAuthentication", "", "", "remote", "ReturnValue", "manual"]
      # Request.accept() - extracts Accept header
      - ["org.http4k.lens", "HeaderKt", false, "accept", "", "", "remote", "ReturnValue", "manual"]
      # HttpMessage.contentType() - extracts Content-Type header
      - ["org.http4k.lens", "HeaderKt", false, "contentType", "", "", "remote", "ReturnValue", "manual"]

      # --- UriTemplate.extract() - extracts path parameters from URI via regex ---
      - ["org.http4k.core", "UriTemplate", false, "extract", "(String)", "", "remote", "ReturnValue", "manual"]

      # --- RequestSource (data class) - client connection metadata ---
      - ["org.http4k.core", "RequestSource", false, "getAddress", "()", "", "local", "ReturnValue", "manual"]
      - ["org.http4k.core", "RequestSource", false, "getScheme", "()", "", "local", "ReturnValue", "manual"]
