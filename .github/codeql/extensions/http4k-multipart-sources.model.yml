extensions:
  # --- Multipart form field/file property accessors (sources) ---
  - addsTo:
      pack: codeql/java-all
      extensible: sourceModel
    data:
      # MultipartFormField (data class in org.http4k.lens, file: parts.kt)
      # val value: String - user-supplied form field value
      - ["org.http4k.lens", "MultipartFormField", false, "getValue", "()", "", "remote", "ReturnValue", "manual"]
      # val headers: Headers - user-supplied headers
      - ["org.http4k.lens", "MultipartFormField", false, "getHeaders", "()", "", "remote", "ReturnValue", "manual"]

      # MultipartFormFile (data class in org.http4k.lens, file: parts.kt)
      # val filename: String - user-supplied filename (path-injection risk)
      - ["org.http4k.lens", "MultipartFormFile", false, "getFilename", "()", "", "remote", "ReturnValue", "manual"]
      # val content: InputStream - uploaded file content
      - ["org.http4k.lens", "MultipartFormFile", false, "getContent", "()", "", "remote", "ReturnValue", "manual"]
      # val contentType: ContentType - user-supplied content type
      - ["org.http4k.lens", "MultipartFormFile", false, "getContentType", "()", "", "remote", "ReturnValue", "manual"]

      # MultipartEntity.Field (sealed class inner data class in org.http4k.core)
      # val value: String
      - ["org.http4k.core", "MultipartEntity$Field", false, "getValue", "()", "", "remote", "ReturnValue", "manual"]
      # val name: String
      - ["org.http4k.core", "MultipartEntity$Field", false, "getName", "()", "", "remote", "ReturnValue", "manual"]

      # MultipartEntity.File (sealed class inner data class in org.http4k.core)
      # val file: MultipartFormFile
      - ["org.http4k.core", "MultipartEntity$File", false, "getFile", "()", "", "remote", "ReturnValue", "manual"]
      # val name: String
      - ["org.http4k.core", "MultipartEntity$File", false, "getName", "()", "", "remote", "ReturnValue", "manual"]

  # --- Multipart body accessors (summaries) ---
  - addsTo:
      pack: codeql/java-all
      extensible: summaryModel
    data:
      # MultipartFormBody.field(name) - extract single field
      - ["org.http4k.core", "MultipartFormBody", false, "field", "", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      # MultipartFormBody.fields(name) - extract all fields with name
      - ["org.http4k.core", "MultipartFormBody", false, "fields", "", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      # MultipartFormBody.file(name) - extract file upload
      - ["org.http4k.core", "MultipartFormBody", false, "file", "", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      # MultipartFormBody.files(name) - extract all files with name
      - ["org.http4k.core", "MultipartFormBody", false, "files", "", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      # MultipartFormBody.fieldValue(name) - extract field value as String
      - ["org.http4k.core", "MultipartFormBody", false, "fieldValue", "", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      # MultipartFormBody.fieldValues(name) - extract all field values
      - ["org.http4k.core", "MultipartFormBody", false, "fieldValues", "", "", "Argument[this]", "ReturnValue", "taint", "manual"]
