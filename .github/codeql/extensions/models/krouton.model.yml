extensions:
  # ============================================================
  # Sources — Krouton URL path extraction.
  # Modelled as sources (not summaries): the value a route handler receives from
  # path extraction IS user input entering the app. This is more robust than a
  # summary chain because the http4k-krouton dispatch machinery obscures the
  # Uri -> parse connection (a summary needs the whole chain intact; a source does
  # not). Matches the approach used in large real-world krouton codebases.
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: sourceModel
    data:
      # Columns: package, type, subtypes, name, signature, ext, OUTPUT, KIND, provenance

      # --- parsePathElement — extracts a typed value from a single path segment ---
      # The public `string`/`int`/etc. vals are VariablePathElement, which extends
      # PathElement (verified via javap). PathElementType is a separate interface that
      # also declares parsePathElement; model both to cover either access pattern.
      - ["com.natpryce.krouton", "PathElement", true, "parsePathElement", "(String)", "", "ReturnValue", "remote", "manual"]
      - ["com.natpryce.krouton", "PathElementType", true, "parsePathElement", "(String)", "", "ReturnValue", "remote", "manual"]

      # --- parse / parsePathElements — extract values from a full path against a template ---
      # parse is an extension function (PathTemplateKt); also expose it on the PathTemplate
      # receiver type, which is how real route handlers invoke it.
      - ["com.natpryce.krouton", "PathTemplate", true, "parse", "(String)", "", "ReturnValue", "remote", "manual"]
      - ["com.natpryce.krouton", "PathTemplate", true, "parse", "(List)", "", "ReturnValue", "remote", "manual"]
      - ["com.natpryce.krouton", "PathTemplate", true, "parsePathElements", "(List)", "", "ReturnValue", "remote", "manual"]
      - ["com.natpryce.krouton", "PathTemplateKt", false, "parse", "(PathTemplate,String)", "", "ReturnValue", "remote", "manual"]
