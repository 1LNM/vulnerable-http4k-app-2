extensions:
  # ============================================================
  # Summaries — Krouton URL path extraction taint propagation
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: summaryModel
    data:
      # Columns: package, type, subtypes, name, signature, ext, input, output, kind, provenance

      # --- PathElement.parsePathElement — parses individual path segment ---
      # The public `string`/`int`/etc. vals are VariablePathElement, which extends
      # PathElement (NOT PathElementType — those are unrelated types that share a method
      # name). Verified via javap: VariablePathElement<T> extends PathElement<T>, and
      # PathElement declares abstract parsePathElement(String). subtypes:true covers
      # VariablePathElement, LiteralPathElement, etc.
      - ["com.natpryce.krouton", "PathElement", true, "parsePathElement", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- parse — extension function, parses full path string against a template ---
      # parse(PathTemplate<T>, String): T — the real-world route extraction entry point.
      # Explicit signature to disambiguate from the parse(PathTemplate,List) overload.
      # splitPath is internal; parse is the public API.
      - ["com.natpryce.krouton", "PathTemplateKt", false, "parse", "(PathTemplate,String)", "", "Argument[1]", "ReturnValue", "taint", "manual"]
