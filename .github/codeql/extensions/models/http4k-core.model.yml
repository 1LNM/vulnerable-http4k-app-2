      - ["org.http4k.core", "HttpMessage", true, "removeHeader", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Request.uri(Uri) — taint propagation ---
      - ["org.http4k.core", "Request", true, "uri", "(Uri)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Request", true, "uri", "(Uri)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Request.getSource() ---
      - ["org.http4k.core", "Request", true, "getSource", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Uri.credentials$default ---
      - ["org.http4k.core", "Uri", false, "credentials$default", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Parameters utilities (Parameters.kt → ParametersKt) ---
      - ["org.http4k.core", "ParametersKt", false, "toParameters", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
