extensions:
  # ============================================================
  # Sources — untrusted data entry points
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: sourceModel
    data:
      # Columns: package, type, subtypes, name, signature, ext, OUTPUT, KIND, provenance

      # --- Request (interface) ---
      - ["org.http4k.core", "Request", true, "query", "(String)", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "Request", true, "queries", "(String)", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "Request", true, "header", "(String)", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "Request", true, "headerValues", "(String)", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "Request", true, "getBody", "()", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "Request", true, "bodyString", "()", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "Request", true, "getUri", "()", "", "ReturnValue", "remote", "manual"]

      # --- HttpMessage (interface, covers both Request and Response) ---
      - ["org.http4k.core", "HttpMessage", true, "header", "(String)", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "headerValues", "(String)", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "bodyString", "()", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "getBody", "()", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "getHeaders", "()", "", "ReturnValue", "remote", "manual"]

      # --- Form data extensions (FormBody.kt → FormBodyKt) ---
      - ["org.http4k.core.body", "FormBodyKt", false, "form", "", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core.body", "FormBodyKt", false, "formAsMap", "", "", "ReturnValue", "remote", "manual"]

      # --- Cookie extensions (CookieExtensions.kt → CookieExtensionsKt) ---
      - ["org.http4k.core.cookie", "CookieExtensionsKt", false, "cookies", "", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core.cookie", "CookieExtensionsKt", false, "cookie", "", "", "ReturnValue", "remote", "manual"]

      # --- Uri.credentials() — extracts username/password from URI userInfo ---
      - ["org.http4k.core", "Uri", false, "credentials", "", "", "ReturnValue", "remote", "manual"]
      - ["org.http4k.core", "Uri", false, "credentials$default", "", "", "ReturnValue", "remote", "manual"]

      # --- UriTemplate.extract() — extracts path parameters from URI via regex ---
      - ["org.http4k.core", "UriTemplate", false, "extract", "(String)", "", "ReturnValue", "remote", "manual"]

      # --- RequestSource (data class) — client connection metadata ---
      - ["org.http4k.core", "RequestSource", false, "getAddress", "()", "", "ReturnValue", "local", "manual"]
      - ["org.http4k.core", "RequestSource", false, "getScheme", "()", "", "ReturnValue", "local", "manual"]

  # ============================================================
  # Sinks — vulnerable endpoints
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: sinkModel
    data:
      # Columns: package, type, subtypes, name, signature, ext, INPUT, KIND, provenance

      # --- Response body injection (html-injection for XSS) ---
      - ["org.http4k.core", "Response", true, "body", "(String)", "", "Argument[0]", "html-injection", "manual"]
      - ["org.http4k.core", "Response", true, "body", "(Body)", "", "Argument[0]", "html-injection", "manual"]
      - ["org.http4k.core", "Response", true, "body", "(InputStream,Long)", "", "Argument[0]", "html-injection", "manual"]

      # --- Response header injection (url-redirection) ---
      - ["org.http4k.core", "Response", true, "header", "(String,String)", "", "Argument[1]", "url-redirection", "manual"]
      - ["org.http4k.core", "Response", true, "replaceHeader", "(String,String)", "", "Argument[1]", "url-redirection", "manual"]

      # --- Request query manipulation ---
      - ["org.http4k.core", "Request", true, "query", "(String,String)", "", "Argument[1]", "url-redirection", "manual"]

      # --- Request.uri(Uri) — SSRF sink ---
      - ["org.http4k.core", "Request", true, "uri", "(Uri)", "", "Argument[0]", "request-forgery", "manual"]

      # --- Uri extension functions (Uri.kt → UriKt) — SSRF via URI construction ---
      - ["org.http4k.core", "UriKt", false, "extend", "", "", "Argument[1]", "request-forgery", "manual"]
      - ["org.http4k.core", "UriKt", false, "relative", "", "", "Argument[1]", "request-forgery", "manual"]
      - ["org.http4k.core", "UriKt", false, "appendToPath", "", "", "Argument[1]", "request-forgery", "manual"]

      # --- Request factory — Request(Method, String) compiles to create$default ---
      - ["org.http4k.core", "Request$Companion", false, "create$default", "", "", "Argument[2]", "request-forgery", "manual"]

      # --- UriTemplate.generate(Map) — URL injection via template parameters ---
      - ["org.http4k.core", "UriTemplate", false, "generate", "", "", "Argument[0]", "url-redirection", "manual"]

  # ============================================================
  # Summaries — taint propagation through methods
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: summaryModel
    data:
      # Columns: package, type, subtypes, name, signature, ext, input, output, kind, provenance

      # --- Uri property accessors (data class) ---
      - ["org.http4k.core", "Uri", false, "getPath", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getQuery", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getHost", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getScheme", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getFragment", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getUserInfo", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getAuthority", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Uri.of(String) — factory on companion ---
      - ["org.http4k.core", "Uri$Companion", false, "of", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Uri mutation methods — both receiver and argument propagate ---
      - ["org.http4k.core", "Uri", false, "scheme", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "scheme", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "host", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "host", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "path", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "path", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "query", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "query", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "fragment", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "fragment", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "userInfo", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "userInfo", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "authority", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "authority", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "query", "(String,String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Uri extension functions (Uri.kt → UriKt) — Argument[0]=receiver, Argument[1]=param ---
      - ["org.http4k.core", "UriKt", false, "extend", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "UriKt", false, "extend", "", "", "Argument[1]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "UriKt", false, "relative", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "UriKt", false, "relative", "", "", "Argument[1]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "UriKt", false, "appendToPath", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "UriKt", false, "appendToPath", "", "", "Argument[1]", "ReturnValue", "taint", "manual"]

      # --- Body property accessors (interface) ---
      - ["org.http4k.core", "Body", true, "getStream", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body", true, "getPayload", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body", true, "getText", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Body companion factory methods ---
      - ["org.http4k.core", "Body$Companion", false, "invoke", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body$Companion", false, "invoke", "(ByteBuffer)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body$Companion", false, "invoke", "(InputStream)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body$Companion", false, "create", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Cookie property accessors (data class) ---
      - ["org.http4k.core.cookie", "Cookie", false, "getValue", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core.cookie", "Cookie", false, "getName", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Credentials property accessors (data class) ---
      - ["org.http4k.core", "Credentials", false, "getUser", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Credentials", false, "getPassword", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- HttpMessage body/header mutation ---
      - ["org.http4k.core", "HttpMessage", true, "body", "(Body)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "body", "(Body)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "body", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "body", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "body", "(InputStream,Long)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "body", "(InputStream,Long)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "header", "(String,String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "header", "(String,String)", "", "Argument[1]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "replaceHeader", "(String,String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
