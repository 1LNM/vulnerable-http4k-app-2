extensions:
  # ============================================================
  # Sinks — http4k template abstraction
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: sinkModel
    data:
      # Columns: package, type, subtypes, name, signature, ext, INPUT, KIND, provenance

      # --- TemplateRenderer.renderToResponse(viewModel) — tainted ViewModel rendered to
      #     the HTTP response body and sent to the browser = XSS.
      #     Extension on TemplateRenderer (Function1); JVM args: Arg[0]=renderer, Arg[1]=viewModel.
      #     Default params (status, contentType) make the call compile to renderToResponse$default. ---
      - ["org.http4k.template", "TemplatesKt", false, "renderToResponse", "", "", "Argument[1]", "html-injection", "manual"]
      - ["org.http4k.template", "TemplatesKt", false, "renderToResponse$default", "", "", "Argument[1]", "html-injection", "manual"]
