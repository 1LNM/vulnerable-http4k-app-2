extensions:
  # --- HTTP client invoke as SSRF execution sinks ---
  # These are the actual points where an HTTP request is sent over the network.
  # If a Request with a tainted URI reaches a client invoke, it's SSRF.
  - addsTo:
      pack: codeql/java-all
      extensible: sinkModel
    data:
      # DualSyncAsyncHttpHandler.invoke(Request) — OkHttp, JettyClient, Fuel
      - ["org.http4k.client", "DualSyncAsyncHttpHandler", true, "invoke", "", "", "Argument[0]", "request-forgery", "manual"]

      # AsyncHttpHandler.invoke(Request, callback) — ApacheAsyncClient, Apache4AsyncClient
      - ["org.http4k.client", "AsyncHttpHandler", true, "invoke", "", "", "Argument[0]", "request-forgery", "manual"]

  # --- Client response taint propagation ---
  # When a client sends a request and receives a response, taint from the
  # request may be reflected in the response (e.g., upstream service echoes input).
  - addsTo:
      pack: codeql/java-all
      extensible: summaryModel
    data:
      - ["org.http4k.client", "DualSyncAsyncHttpHandler", true, "invoke", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
