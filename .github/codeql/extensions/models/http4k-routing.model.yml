extensions:
  # ============================================================
  # Sources
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: sourceModel
    data:
      # Request.path(name) — extract path parameter (extensions.kt → ExtensionsKt)
      - ["org.http4k.routing", "ExtensionsKt", false, "path", "", "", "ReturnValue", "remote", "manual"]

  # ============================================================
  # Sinks
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: sinkModel
    data:
      # ResourceLoader.load(path) — path-injection sink
      - ["org.http4k.routing", "ResourceLoader", true, "load", "(String)", "", "Argument[0]", "path-injection", "manual"]

  # ============================================================
  # Barriers (sanitizers)
  # ============================================================
  - addsTo:
      pack: codeql/java-all
      extensible: barrierModel
    data:
      # Columns: package, type, subtypes, name, signature, ext, OUTPUT, KIND, provenance
      # String.resolvedWithinRoot() (resourcePath.kt → ResourcePathKt) sanitizes path traversal:
      # rejects null bytes and backslashes, resolves "." / ".." within the root, returns null if
      # the path escapes. Its return value is safe for path-injection sinks.
      - ["org.http4k.routing", "ResourcePathKt", false, "resolvedWithinRoot", "", "", "ReturnValue", "path-injection", "manual"]
