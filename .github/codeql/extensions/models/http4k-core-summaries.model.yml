extensions:
  - addsTo:
      pack: codeql/java-all
      extensible: summaryModel
    data:
      # --- Lens extraction: invoke(target) returns extracted value ---
      # subtypes=true covers BiDiLens and all lens subtypes
      - ["org.http4k.lens", "Lens", true, "invoke", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Uri property accessors (data class, subtypes=false) ---
      - ["org.http4k.core", "Uri", false, "getPath", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getQuery", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getHost", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getScheme", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getFragment", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getUserInfo", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "getAuthority", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Uri.of(String) - factory method on companion object ---
      - ["org.http4k.core", "Uri$Companion", false, "of", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Body property accessors (interface, subtypes=true) ---
      - ["org.http4k.core", "Body", true, "getStream", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body", true, "getPayload", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body", true, "getText", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Cookie property accessors (data class, subtypes=false) ---
      - ["org.http4k.core.cookie", "Cookie", false, "getValue", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core.cookie", "Cookie", false, "getName", "()", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Uri mutation methods: both receiver and argument taint propagate to result ---
      # Uri.scheme/host/path/query/fragment/userInfo/authority(String) - copy with new component
      - ["org.http4k.core", "Uri", false, "scheme", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "scheme", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "host", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "host", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "path", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "path", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "query", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "query", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "fragment", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "fragment", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "userInfo", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "userInfo", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "authority", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "authority", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # Uri.query(name, value) - appends query parameter
      - ["org.http4k.core", "Uri", false, "query", "(String,String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # Uri.extend(Uri) - appends path + combines query params
      - ["org.http4k.core", "Uri", false, "extend", "", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "extend", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # Uri.relative(String) - RFC3986 relative resolution
      - ["org.http4k.core", "Uri", false, "relative", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "relative", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # Uri.appendToPath(String)
      - ["org.http4k.core", "Uri", false, "appendToPath", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Uri", false, "appendToPath", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Parameters utilities (Parameters.kt -> ParametersKt) ---
      # String.toParameters() - parses "key=value&key2=value2" query string
      - ["org.http4k.core", "ParametersKt", false, "toParameters", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      # Parameters.toParametersMap()
      - ["org.http4k.core", "ParametersKt", false, "toParametersMap", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      # Parameters.findSingle(name)
      - ["org.http4k.core", "ParametersKt", false, "findSingle", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      # Parameters.findMultiple(name)
      - ["org.http4k.core", "ParametersKt", false, "findMultiple", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      # Uri.queries() - extracts query parameters from URI
      - ["org.http4k.core", "ParametersKt", false, "queries", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- HttpMessage.with() (http.kt -> HttpKt) ---
      # Applies lens injection modifiers; taint from receiver propagates
      - ["org.http4k.core", "HttpKt", false, "with", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Request/Response parsing (parser.kt -> ParserKt) ---
      # Request.Companion.parse(String) / Response.Companion.parse(String)
      # Extension on companion: JVM static ParserKt.parse(Companion, String, String)
      # Argument[1] is the raw HTTP string; taint propagates to parsed object
      - ["org.http4k.core", "ParserKt", false, "parse", "", "", "Argument[1]", "ReturnValue", "taint", "manual"]

      # --- Request.toCurl() (curl.kt -> CurlKt) ---
      # Extension: CurlKt.toCurl(Request, int) -> String
      - ["org.http4k.core", "CurlKt", false, "toCurl", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Body companion factory methods (Body$Companion) ---
      - ["org.http4k.core", "Body$Companion", false, "invoke", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body$Companion", false, "invoke", "(ByteBuffer)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Body$Companion", false, "invoke", "(InputStream)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Request.uri(Uri) - returns new Request with given URI ---
      - ["org.http4k.core", "Request", true, "uri", "(Uri)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "Request", true, "uri", "(Uri)", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- HttpMessage body/header mutation - taint propagation ---
      # body(Body) - sets body content
      - ["org.http4k.core", "HttpMessage", true, "body", "(Body)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "body", "(Body)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      # body(String) - sets body from string
      - ["org.http4k.core", "HttpMessage", true, "body", "(String)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "body", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      # body(InputStream, Long) - sets body from stream
      - ["org.http4k.core", "HttpMessage", true, "body", "(InputStream,Long)", "", "Argument[0]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "body", "(InputStream,Long)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      # header(name, value) - adds header
      - ["org.http4k.core", "HttpMessage", true, "header", "(String,String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "header", "(String,String)", "", "Argument[1]", "ReturnValue", "taint", "manual"]
      # replaceHeader(name, value) - replaces header
      - ["org.http4k.core", "HttpMessage", true, "replaceHeader", "(String,String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]
      - ["org.http4k.core", "HttpMessage", true, "replaceHeader", "(String,String)", "", "Argument[1]", "ReturnValue", "taint", "manual"]
      # removeHeader(name) - removes header, preserves rest
      - ["org.http4k.core", "HttpMessage", true, "removeHeader", "(String)", "", "Argument[this]", "ReturnValue", "taint", "manual"]

      # --- Response.cookie(Cookie) (CookieExtensions.kt -> CookieExtensionsKt) ---
      # Extension: CookieExtensionsKt.cookie(Response, Cookie) -> Response
      - ["org.http4k.core.cookie", "CookieExtensionsKt", false, "cookie", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- Request.form(name, value) (FormBody.kt -> FormBodyKt) ---
      # Extension: FormBodyKt.form(Request, String, String) -> Request (injects form data)
      - ["org.http4k.core.body", "FormBodyKt", false, "form", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]

      # --- UriTemplate.generate(Map) - generates URI from parameters ---
      - ["org.http4k.core", "UriTemplate", false, "generate", "", "", "Argument[0]", "ReturnValue", "taint", "manual"]
