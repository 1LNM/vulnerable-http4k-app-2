extensions:
  - addsTo:
      pack: codeql/java-all
      extensible: sinkModel
    data:
      # --- Response.header(name, value) - url-redirection when setting Location header ---
      # CodeQL cannot condition on header name; this models ALL header values as potential sinks
      - ["org.http4k.core", "Response", true, "header", "(String,String)", "", "url-redirection", "Argument[1]", "manual"]

      # --- Response.body(String) - reflected XSS via string body ---
      - ["org.http4k.core", "Response", true, "body", "(String)", "", "xss", "Argument[0]", "manual"]

      # --- Response.body(Body) - reflected XSS via Body object ---
      - ["org.http4k.core", "Response", true, "body", "(Body)", "", "xss", "Argument[0]", "manual"]

      # --- Extension functions: header.kt -> HeaderKt ---
      # Response.html(body) - sets content-type to text/html and body
      - ["org.http4k.lens", "HeaderKt", false, "html", "", "", "xss", "Argument[1]", "manual"]
      # Response.location(uri) - sets Location header for redirect
      - ["org.http4k.lens", "HeaderKt", false, "location", "", "", "url-redirection", "Argument[1]", "manual"]

      # --- Additional Response sinks ---
      # Response.replaceHeader(name, value)
      - ["org.http4k.core", "Response", true, "replaceHeader", "(String,String)", "", "url-redirection", "Argument[1]", "manual"]
      # Response.body(InputStream, Long)
      - ["org.http4k.core", "Response", true, "body", "(InputStream,Long)", "", "xss", "Argument[0]", "manual"]

      # --- Request query/header manipulation with tainted values ---
      - ["org.http4k.core", "Request", true, "query", "(String,String)", "", "url-redirection", "Argument[1]", "manual"]

      # --- ResourceLoader.load(path) - path-injection sink ---
      # Loads file/resource by path; tainted path → directory traversal
      - ["org.http4k.routing", "ResourceLoader", true, "load", "(String)", "", "path-injection", "Argument[0]", "manual"]

      # --- Request.uri(Uri) - SSRF sink when setting tainted URI on request ---
      - ["org.http4k.core", "Request", true, "uri", "(Uri)", "", "request-forgery", "Argument[0]", "manual"]

      # --- UriTemplate.generate(Map) - path/URL injection via template parameters ---
      - ["org.http4k.core", "UriTemplate", false, "generate", "", "", "url-redirection", "Argument[0]", "manual"]
